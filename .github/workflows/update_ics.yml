name: Update ICS

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  # tous les jours à minuit
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install holidays requests python-dateutil

      - name: Generate ICS
        run: python calendrier.py

      - name: Validate ICS syntax
        run: python scripts/validate_ics.py

      - name: Prepare publish directory
        run: |
          rm -rf public
          mkdir -p public
          cp index.html public/
          cp CNAME public/
          if [ -f .nojekyll ]; then cp .nojekyll public/; else touch public/.nojekyll; fi
          cp favicon.svg public/
          cp og-image.svg public/
          cp calendrier.ics public/
          cp zone-a.ics public/
          cp zone-b.ics public/
          cp zone-c.ics public/
          cp calendrier-essentiel.ics public/
          cp calendrier-culturel.ics public/
          cp calendrier-commercial.ics public/
          cp calendrier-complet.ics public/
          cp calendrier.json public/
          cp calendrier.csv public/
          cp calendrier.xml public/
          cp events-meta.json public/
          cp zone-departments.json public/

      - name: Push ICS to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          cname: calendrier-fr.tibotsr.dev
          keep_files: true
          commit_message: "🤖 Update ICS"
          force_orphan: true