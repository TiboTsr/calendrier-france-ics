    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ea8fe"/>
      <stop offset="50%" stop-color="#9f7aea"/>
      <stop offset="100%" stop-color="#4de2c5"/>
